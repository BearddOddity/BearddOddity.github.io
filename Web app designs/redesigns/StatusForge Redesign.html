<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StatusForge — Redesign</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #050505; color: var(--text-body); font-family: var(--font-ui);
    background-image: radial-gradient(circle at 15% -10%, rgba(145,70,255,.12), transparent 45%); }
  #root { min-height: 100vh; display: flex; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
  .sidebar { width: 240px; flex-shrink: 0; background: rgba(0,0,0,.47); backdrop-filter: blur(16px); border-right: 1px solid var(--line-1); display: flex; flex-direction: column; padding: 16px 12px; }
  .main { flex: 1; padding: 32px; overflow-y: auto; min-width: 0; }
  .now-playing { display: flex; gap: 20px; align-items: center; padding: 22px; }
  .cover { flex-shrink: 0; width: 140px; height: 180px; border-radius: 16px; overflow: hidden; background: rgba(0,0,0,.3); box-shadow: 0 8px 24px rgba(0,0,0,.4); position: relative; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.015); } }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 20px 0; }
  .conn-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line-1); }
  .conn-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel">
const {
  Button, Card, Badge, StatusDot, SectionHead, Divider, StatCard,
  NavItem, Breadcrumbs, Toolbar, Tooltip,
  Modal, Accordion, ProgressBar,
  EmptyState, ToastManager, bdToast,
} = window.BearddOddityDesignSystem_726917;

const COVER = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 400'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232a1a4d'/%3E%3Cstop offset='1' stop-color='%23101022'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' width='300' height='400'/%3E%3Ccircle cx='150' cy='150' r='70' fill='%239146ff' opacity='.55'/%3E%3Ccircle cx='150' cy='150' r='40' fill='%23c4b5fd' opacity='.5'/%3E%3Crect y='300' width='300' height='100' fill='%23000' opacity='.4'/%3E%3Ctext x='50%25' y='355' text-anchor='middle' fill='%23fff' font-size='22' font-family='system-ui' font-weight='700'%3ENeon Drift%3C/text%3E%3C/svg%3E";

const NAV = [
  { id: "dashboard", label: "Status Room", icon: "⏳" },
  { id: "library", label: "Library", icon: "📚" },
  { id: "settings", label: "Settings", icon: "⚙️" },
];
const PLATFORMS = [
  { name: "Twitch", status: "on" },
  { name: "Kick", status: "on" },
  { name: "Streamer.bot", status: "on" },
];
const OVERLAYS = [
  { id: "hl", label: "Horizontal Left", icon: "◀", file: "Horizontal_Left.html" },
  { id: "hr", label: "Horizontal Right", icon: "▶", file: "Horizontal_Right.html" },
  { id: "vt", label: "Vertical", icon: "▼", file: "Vertical.html" },
];

function Dashboard({ running, playing, onToggle }) {
  const [overlays, setOverlays] = React.useState([]);
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [idx, setIdx] = React.useState(0);

  const addOverlay = (o) => {
    setOverlays((p) => [...p, { id: Date.now(), label: o.label, url: `/••••••••••kN2x/${o.file}` }]);
    bdToast.push("Overlay URL copied to clipboard", "success");
  };

  return (
    <div>
      <Breadcrumbs items={[{ label: "StatusForge" }, { label: "Status Room" }]} />
      <div className="bd-h1" style={{ margin: "14px 0 20px" }}>Status Room</div>

      <Card className="now-playing" style={{ marginBottom: 20 }} padding={0}>
        <div className="cover">
          <img src={COVER} alt="Neon Drift" style={{ width: "100%", height: "100%", objectFit: "cover", animation: playing ? "breathe 8s ease-in-out infinite" : "none" }} />
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="bd-label" style={{ marginBottom: 6 }}>{playing ? "Now Playing" : running ? "Idle" : "Engine offline"}</div>
          <div className="bd-h2">{playing ? "Neon Drift" : running ? "Just Chatting" : "Offline"}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
            <Button variant={running ? "danger" : "cta"} onClick={onToggle}>{running ? "⏹ Stop Engine" : "▶ Start Engine"}</Button>
            {playing && <Button variant="ghost">🚫 Exile to Apps</Button>}
          </div>
        </div>
      </Card>

      <div className="stat-row">
        <StatCard label="CPU" value={running ? "12%" : "—"} />
        <StatCard label="Memory" value={running ? "384 MB" : "—"} />
        <StatCard label="GPU" value={running ? "42%" : "—"} delta={running ? "+6% vs idle" : undefined} />
      </div>

      <Card style={{ marginBottom: 20, padding: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1.2fr", gap: 20 }}>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="bd-label">Platform Connections</span>
              <StatusDot status={running ? "on" : "off"} label={running ? "LIVE" : "POLLING"} />
            </div>
            {PLATFORMS.map((p) => (
              <div className="conn-row" key={p.name}>
                <span style={{ fontSize: 13, color: "var(--text-muted)" }}>{p.name}</span>
                <StatusDot status={running ? "on" : "off"} label={running ? "Connected" : "Offline"} />
              </div>
            ))}
          </div>
          <Divider vertical />
          <div>
            <span className="bd-label" style={{ display: "block", marginBottom: 12 }}>Overlay Generator</span>
            {overlays.length === 0 ? (
              <EmptyState icon="🔗" title="No overlays yet" description="Browse the library to generate your first overlay URL." />
            ) : (
              overlays.map((o) => (
                <div key={o.id} style={{ padding: "8px 12px", background: "rgba(0,0,0,.2)", border: "1px solid var(--line-1)", borderRadius: 10, display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 10, fontWeight: 500, color: "var(--text-faint)" }}>{o.label}</div>
                    <div style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)", wordBreak: "break-all" }}>{o.url}</div>
                  </div>
                  <Button variant="danger" size="sm" onClick={() => setOverlays((p) => p.filter((x) => x.id !== o.id))}>✕</Button>
                </div>
              ))
            )}
            <div style={{ display: "flex", justifyContent: "center", marginTop: 4 }}>
              <Button variant="ghost" onClick={() => setPickerOpen(true)}>Browse Overlays</Button>
            </div>
          </div>
        </div>
      </Card>

      <Accordion items={[
        { title: "Metadata", content: (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
            {[["Genre", "Racing · Synthwave"], ["Developer", "Chromawave"], ["Publisher", "Neon Interactive"], ["Release", "2024-11-08"]].map(([l, v]) => (
              <div key={l}>
                <div className="bd-label">{l}</div>
                <div style={{ fontSize: 12, fontWeight: 500, color: "var(--text-body)", marginTop: 2 }}>{playing ? v : "—"}</div>
              </div>
            ))}
          </div>
        ) },
      ]} />

      <Modal open={pickerOpen} onClose={() => setPickerOpen(false)} title="Select Overlay"
        footer={<Button variant="cta" onClick={() => { addOverlay(OVERLAYS[idx]); setPickerOpen(false); }}>Use {OVERLAYS[idx].label}</Button>}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Button variant="ghost" size="sm" onClick={() => setIdx((i) => (i - 1 + OVERLAYS.length) % OVERLAYS.length)}>‹</Button>
          <div style={{ flex: 1, borderRadius: 12, overflow: "hidden", border: "1px solid rgba(145,70,255,.5)", height: 140, background: "linear-gradient(135deg,#1a1a2e,#16213e)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 6 }}>
            <div style={{ fontSize: 22 }}>{OVERLAYS[idx].icon}</div>
            <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{OVERLAYS[idx].label}</span>
          </div>
          <Button variant="ghost" size="sm" onClick={() => setIdx((i) => (i + 1) % OVERLAYS.length)}>›</Button>
        </div>
      </Modal>
    </div>
  );
}

function ComingSoon({ label }) {
  return <EmptyState icon="🧭" title={label} description="This surface lives in the full app — Status Room is the showcase view." />;
}

function App() {
  const [view, setView] = React.useState("dashboard");
  const [running, setRunning] = React.useState(true);
  const toggle = () => { setRunning((r) => !r); bdToast.push(running ? "Engine stopped" : "Engine started", "success"); };
  return (
    <>
      <nav className="sidebar">
        <div style={{ textAlign: "center", padding: "10px 0 16px" }}>
          <div className="bd-logo" style={{ fontSize: 18 }}>Status<span style={{ color: "var(--bd-accent)" }}>Forge</span></div>
          <div style={{ fontSize: 10, color: "var(--text-faint)", marginTop: 2, fontFamily: "var(--font-mono)" }}>presence engine · v0.5.0</div>
        </div>
        {NAV.map((n) => <NavItem key={n.id} icon={n.icon} label={n.label} active={view === n.id} onClick={() => setView(n.id)} />)}
        <div style={{ flex: 1 }} />
        <Divider style={{ marginBottom: 12 }} />
        <div style={{ padding: "8px 12px" }}>
          <StatusDot status={running ? "on" : "off"} label={running ? "Engine Online" : "Engine Offline"} />
        </div>
      </nav>
      <main className="main scroll">
        {view === "dashboard" ? <Dashboard running={running} playing={running} onToggle={toggle} /> : <ComingSoon label={NAV.find((n) => n.id === view).label} />}
      </main>
      <ToastManager />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
