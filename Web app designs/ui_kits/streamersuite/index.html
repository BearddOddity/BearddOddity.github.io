<!-- @dsCard group="StreamerSuite" viewport="1280x720" name="StreamerSuite — Launcher + Chat" subtitle="Flagship streamer toolkit: app launcher into multi-platform chat — also available as a Template" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamerSuite</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #050505; color: var(--text-body); font-family: var(--font-ui); overflow: hidden; }
  #root { height: 100vh; }
  .ss-topbar { height: 48px; flex-shrink: 0; background: var(--surface-2); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  .ico-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-faint); background: transparent; border: none; cursor: pointer; transition: all .2s; }
  .ico-btn:hover { color: var(--text-strong); background: rgba(255,255,255,.06); }
  .pill { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 500; border: 1px solid; cursor: pointer; transition: all .2s; background: rgba(255,255,255,.03); color: var(--text-faint); border-color: rgba(255,255,255,.06); }
  .pill:hover { color: var(--text-muted); background: rgba(255,255,255,.05); }
  .pill.on { background: rgba(145,70,255,.12); color: var(--bd-accent-text); border-color: rgba(145,70,255,.25); }
  .app-card { text-align: left; background: rgba(0,0,0,.45); backdrop-filter: blur(10px); border: 1px solid var(--line-2); border-radius: 16px; padding: 16px; cursor: pointer; transition: all .2s; box-shadow: var(--shadow-card); }
  .app-card:hover { transform: translateY(-2px); border-color: var(--line-strong); box-shadow: var(--shadow-card-hover); }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
  .msg:hover { background: rgba(255,255,255,.02); }
  input.bare { background: transparent; border: none; outline: none; color: #fff; font-size: 13px; width: 100%; font-family: var(--font-ui); }
  input.bare::placeholder { color: var(--text-dim); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const ACCENT = "var(--bd-accent)";

const APPS = [
  { id: "chat", name: "ChatConfluence", icon: "💬", category: "chat", featured: true, description: "Every platform's chat unified in one live window." },
  { id: "status", name: "StatusForge", icon: "⏳", category: "tools", featured: true, description: "Rich game-presence engine → Twitch, Kick & overlays." },
  { id: "scene", name: "Scene Switcher", icon: "🎬", category: "tools", description: "obs-websocket scene & source control with hotkeys." },
  { id: "sound", name: "Sound Board", icon: "🎛️", category: "media", description: "Hotkey-triggered audio pads with routing." },
  { id: "alerts", name: "Alerts Hub", icon: "✨", category: "alerts", description: "Follow, sub & donation alert overlays." },
  { id: "stats", name: "Stream Stats", icon: "📊", category: "utilities", description: "Live viewer, chat & follower metrics." },
  { id: "timer", name: "Stream Timer", icon: "⏱️", category: "utilities", description: "Countdown, BRB and marathon timers." },
  { id: "notes", name: "Notes & Commands", icon: "📝", category: "tools", description: "Manage chat commands and run-of-show notes." },
];
const CATS = [
  { id: "chat", label: "Chat" }, { id: "tools", label: "Tools" }, { id: "alerts", label: "Alerts" },
  { id: "media", label: "Media" }, { id: "utilities", label: "Utilities" },
];
const PLATFORMS = {
  twitch: { label: "Twitch", color: "var(--brand-twitch)", badge: "bd-badge-purple" },
  kick:   { label: "Kick",   color: "var(--brand-kick)", badge: "bd-badge-green" },
  joystick: { label: "JoystickTV", color: "var(--brand-joystick)", badge: "bd-badge-cyan" },
};
const CHATTERS = [
  { platform: "twitch", name: "pixelwitch", color: "#ff7ac6", text: "that clutch was insane 😭", badges: ["MOD"] },
  { platform: "kick", name: "greenrunner", color: "#7ee787", text: "GG go next", badges: [] },
  { platform: "twitch", name: "vodwatcher", color: "#79c0ff", text: "what's the overlay you're using?", badges: ["SUB×6"] },
  { platform: "joystick", name: "latenite", color: "#ffa657", text: "just followed, love the vibe here", badges: [] },
  { platform: "kick", name: "bitcrusher", color: "#d2a8ff", text: "chat is so fast today lmao", badges: ["VIP"] },
];

function TopBar({ active, onHome, onSettings }) {
  const app = APPS.find(a => a.id === active);
  return (
    <div className="ss-topbar">
      <button className="ico-btn" onClick={onHome} title="App Launcher">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z"/></svg>
      </button>
      <div className="bd-divider-v" style={{ height: 20 }} />
      <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
        {app ? (
          <>
            <span style={{ fontSize: 16 }}>{app.icon}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-strong)" }}>{app.name}</span>
            <span className="bd-badge bd-badge-ghost">{app.category}</span>
          </>
        ) : (
          <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-faint)" }}>Ultimate Streaming Companion</span>
        )}
      </div>
      <button className="ico-btn" style={{ marginLeft: "auto" }} onClick={onSettings} title="Settings">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      </button>
    </div>
  );
}

function Launcher({ onLaunch }) {
  const [cat, setCat] = useState(null);
  const [q, setQ] = useState("");
  let list = APPS.filter(a => !cat || a.category === cat);
  if (q.trim()) list = list.filter(a => (a.name + a.description).toLowerCase().includes(q.toLowerCase()));
  const grouped = !q.trim();
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "24px 24px 16px" }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: "var(--text-strong)", letterSpacing: "-.01em", margin: 0 }}>Ultimate Streaming Companion</h1>
        <p style={{ fontSize: 12, color: "var(--text-faint)", marginTop: 2 }}>All the tools a streamer needs, in one place</p>
        <div className="bd-toolbar" style={{ marginTop: 16 }}>
          <svg width="16" height="16" style={{ marginLeft: 6, color: "var(--text-dim)" }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input className="bare" value={q} onChange={e => setQ(e.target.value)} placeholder="Search apps…" />
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          <button className={`pill ${!cat ? "on" : ""}`} onClick={() => setCat(null)}>All</button>
          {CATS.map(c => (
            <button key={c.id} className={`pill ${cat === c.id ? "on" : ""}`} onClick={() => setCat(cat === c.id ? null : c.id)}>
              {c.label} ({APPS.filter(a => a.category === c.id).length})
            </button>
          ))}
        </div>
      </div>
      <div className="scroll" style={{ flex: 1, overflowY: "auto", padding: "0 24px 24px" }}>
        {grouped ? CATS.filter(c => !cat || c.id === cat).map(c => {
          const apps = list.filter(a => a.category === c.id);
          if (!apps.length) return null;
          return (
            <div key={c.id} style={{ marginBottom: 24 }}>
              <h2 style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: ".12em", color: "var(--text-dim)", fontWeight: 600, marginBottom: 12 }}>{c.label}</h2>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: 12 }}>
                {apps.map(a => <AppCard key={a.id} app={a} onLaunch={onLaunch} />)}
              </div>
            </div>
          );
        }) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: 12 }}>
            {list.map(a => <AppCard key={a.id} app={a} onLaunch={onLaunch} />)}
            {!list.length && <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 48, color: "var(--text-dim)" }}>No apps match "{q}"</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function AppCard({ app, onLaunch }) {
  return (
    <button className="app-card" onClick={() => onLaunch(app.id)}>
      <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
        <span className="bd-section-icon">{app.icon}</span>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <h3 style={{ fontSize: 13, fontWeight: 600, color: "var(--text-strong)", margin: 0 }}>{app.name}</h3>
            {app.featured && <span className="bd-badge bd-badge-purple">Featured</span>}
          </div>
          <p style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 6, lineHeight: 1.5 }}>{app.description}</p>
          <span className="bd-badge bd-badge-ghost" style={{ marginTop: 8, display: "inline-flex" }}>{app.category}</span>
        </div>
      </div>
    </button>
  );
}

function ChatApp() {
  const [channels, setChannels] = useState([
    { platform: "twitch", name: "beardds", connected: true },
    { platform: "kick", name: "beardds", connected: true },
  ]);
  const [multi, setMulti] = useState(true);
  const [active, setActive] = useState("twitch:beardds");
  const [msgs, setMsgs] = useState(() => CHATTERS.map((c, i) => ({ ...c, id: i })));
  const [input, setInput] = useState("");
  const [sendAs, setSendAs] = useState("twitch");
  const bottom = useRef(null);
  useEffect(() => { bottom.current?.parentElement.scrollTo(0, 1e6); }, [msgs.length]);

  const send = (e) => {
    e.preventDefault();
    if (!input.trim()) return;
    setMsgs(m => [...m, { id: Date.now(), platform: sendAs, name: "beardds", color: PLATFORMS[sendAs].color, text: input.trim(), badges: ["MOD", "STREAMER"] }]);
    setInput("");
  };
  const addChannel = () => {
    const opts = ["joystick", "twitch", "kick"].filter(p => !channels.some(c => c.platform === p));
    const p = opts[0] || "twitch";
    setChannels(c => [...c, { platform: p, name: "newchannel", connected: true }]);
  };
  const connected = channels.filter(c => c.connected).length;

  return (
    <div style={{ display: "flex", height: "100%" }}>
      {/* Sidebar */}
      <div style={{ width: 256, flexShrink: 0, background: "var(--surface-1)", borderRight: "1px solid var(--line-2)", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "20px 16px 16px" }}>
          <div className="bd-section-head">
            <span className="bd-section-icon">⚡</span>
            <div><div className="bd-section-title">ChatConfluence</div><div className="bd-section-desc">Multi-platform chat</div></div>
          </div>
        </div>
        <div style={{ padding: "0 12px 12px" }}>
          <button onClick={() => setMulti(m => !m)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 12, fontSize: 13, fontWeight: 500, cursor: "pointer", border: "1px solid",
            background: multi ? "rgba(145,70,255,.1)" : "rgba(255,255,255,.03)", borderColor: multi ? "rgba(145,70,255,.25)" : "rgba(255,255,255,.06)", color: multi ? ACCENT : "var(--text-faint)" }}>
            <span>🔀</span><span>Multi-Chat</span>
            <span className={`bd-badge ${multi ? "bd-badge-purple" : "bd-badge-ghost"}`} style={{ marginLeft: "auto" }}>{multi ? "ON" : "OFF"}</span>
          </button>
        </div>
        <div className="scroll" style={{ flex: 1, overflowY: "auto", padding: "0 12px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px", marginBottom: 8 }}>
            <span style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: ".14em", color: "var(--text-dim)", fontWeight: 600 }}>Channels</span>
            <button onClick={addChannel} style={{ fontSize: 11, color: ACCENT, fontWeight: 500, background: "none", border: "none", cursor: "pointer" }}>+ Add</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            {channels.map(ch => {
              const key = `${ch.platform}:${ch.name}`;
              const isActive = multi || active === key;
              const m = PLATFORMS[ch.platform];
              return (
                <div key={key} onClick={() => setActive(key)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 12, cursor: "pointer", border: "1px solid",
                  background: isActive ? "rgba(255,255,255,.06)" : "transparent", borderColor: isActive ? "rgba(255,255,255,.08)" : "transparent" }}>
                  <span className={`bd-dot ${ch.connected ? "bd-dot-on" : "bd-dot-off"}`} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: "var(--text-body)" }}>{ch.name}</div>
                    <span className={`bd-badge ${m.badge}`} style={{ marginTop: 4 }}>{m.label}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ padding: "12px 16px", borderTop: "1px solid var(--line-1)", display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--text-dim)" }}>
          <span>{channels.length} channels</span>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span className={`bd-dot ${connected ? "bd-dot-on" : "bd-dot-off"}`} />{connected} connected</span>
        </div>
      </div>
      {/* Chat panel */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", background: "#050505", minWidth: 0 }}>
        <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--line-2)", display: "flex", alignItems: "center", gap: 12, background: "var(--surface-1)" }}>
          <span style={{ fontSize: 16 }}>🔀</span>
          <span style={{ fontSize: 14, fontWeight: 700, color: ACCENT }}>{multi ? "Multi-Chat" : active.split(":")[1]}</span>
          {multi && channels.map(c => <span key={c.platform} className={`bd-badge ${PLATFORMS[c.platform].badge}`}>{c.platform} ×1</span>)}
          <span style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
            <span className="bd-dot bd-dot-on" /><span style={{ fontSize: 10, color: "var(--bd-green)", fontWeight: 500 }}>LIVE</span>
          </span>
        </div>
        <div className="scroll" style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
          {msgs.map(msg => (
            <div key={msg.id} className="msg" style={{ padding: "4px 16px", fontSize: 13, lineHeight: 1.6, display: "flex", gap: 8, alignItems: "flex-start" }}>
              {multi && <span className={`bd-badge ${PLATFORMS[msg.platform].badge}`} style={{ marginTop: 2, flexShrink: 0 }}>{msg.platform}</span>}
              <div style={{ minWidth: 0 }}>
                {msg.badges.map((b, i) => <span key={i} style={{ display: "inline-block", padding: "1px 4px", marginRight: 3, fontSize: 9, borderRadius: 3, background: "rgba(255,255,255,.04)", color: "var(--text-faint)", border: "1px solid var(--line-2)" }}>{b}</span>)}
                <span style={{ fontWeight: 600, color: msg.color }}>{msg.name}</span>
                <span style={{ color: "var(--text-dim)" }}>: </span>
                <span style={{ color: "var(--text-muted)", wordBreak: "break-word" }}>{msg.text}</span>
              </div>
            </div>
          ))}
          <div ref={bottom} />
        </div>
        <form onSubmit={send} style={{ padding: "12px 16px", borderTop: "1px solid var(--line-2)", display: "flex", gap: 8 }}>
          {multi && (
            <select className="bd-select" value={sendAs} onChange={e => setSendAs(e.target.value)} style={{ minWidth: 120 }}>
              {channels.map(c => <option key={c.platform} value={c.platform}>{PLATFORMS[c.platform].label}</option>)}
            </select>
          )}
          <input className="bd-input" style={{ flex: 1 }} value={input} onChange={e => setInput(e.target.value)} placeholder={`Send to ${multi ? PLATFORMS[sendAs].label : active.split(":")[1]}…`} />
          <button type="submit" className="bd-btn bd-btn-cta" disabled={!input.trim()}>Send</button>
        </form>
      </div>
    </div>
  );
}

function Placeholder({ app }) {
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, color: "var(--text-faint)" }}>
      <div style={{ fontSize: 48 }}>{app.icon}</div>
      <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text-strong)" }}>{app.name}</div>
      <div style={{ fontSize: 12, maxWidth: 320, textAlign: "center", lineHeight: 1.6 }}>{app.description}</div>
      <span className="bd-badge bd-badge-purple">{app.category}</span>
    </div>
  );
}

function App() {
  const [active, setActive] = useState(null);
  const app = APPS.find(a => a.id === active);
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#050505" }}>
      <TopBar active={active} onHome={() => setActive(null)} onSettings={() => {}} />
      <div style={{ flex: 1, minHeight: 0 }}>
        {!active ? <Launcher onLaunch={setActive} />
          : active === "chat" ? <ChatApp />
          : <Placeholder app={app} />}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
