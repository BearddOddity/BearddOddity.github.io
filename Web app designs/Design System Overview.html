<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BearddOddity — Design System Overview</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bd-black); color: var(--text-body); font-family: var(--font-ui); }
  .glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 900px; height: 500px;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%); pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 56px 32px 120px; }

  .hero { margin-bottom: 64px; }
  .hero .kicker { font-family: var(--font-mono); font-size: var(--fs-micro); letter-spacing: var(--tracking-wider);
    text-transform: uppercase; color: var(--bd-accent-text); font-weight: var(--fw-semibold); }
  .hero h1 { font-size: var(--fs-3xl); font-weight: var(--fw-bold); letter-spacing: var(--tracking-tight);
    color: var(--text-strong); margin: 10px 0 12px; }
  .hero p { font-size: var(--fs-lg); color: var(--text-muted); max-width: 700px; line-height: var(--lh-normal); margin: 0; }

  section.block { margin-bottom: 72px; }
  .block-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px;
    border-bottom: 1px solid var(--line-2); padding-bottom: 14px; }
  .block-head h2 { font-size: var(--fs-xl); font-weight: var(--fw-semibold); color: var(--text-strong); margin: 0; }
  .block-head span { font-family: var(--font-mono); font-size: var(--fs-mini); color: var(--text-faint); }

  .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .swatch { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--line-2); background: var(--surface-1); }
  .swatch .chip { height: 64px; }
  .swatch .meta { padding: 8px 10px; }
  .swatch .name { font-size: var(--fs-xs); color: var(--text-body); font-weight: var(--fw-medium); }
  .swatch .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }

  .type-row { display: flex; align-items: baseline; gap: 18px; padding: 14px 0; border-bottom: 1px solid var(--line-1); }
  .type-row .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 130px; flex-shrink: 0; }
  .type-row .sample { color: var(--text-strong); }

  .family-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
  .family-card { border: 1px solid var(--line-2); background: var(--surface-1); border-radius: var(--radius-2xl); padding: 20px; }
  .family-card .fname { font-size: 10px; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--text-faint); font-weight: var(--fw-semibold); margin-bottom: 8px; }
  .family-card .fsample { font-size: 22px; color: var(--text-strong); }

  .space-row { display: flex; align-items: center; gap: 14px; padding: 7px 0; }
  .space-row .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 90px; flex-shrink: 0; }
  .space-row .bar { height: 10px; background: var(--bd-accent); border-radius: 3px; }
  .space-row .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }

  .radius-grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .radius-item { text-align: center; }
  .radius-item .box { width: 64px; height: 64px; background: var(--surface-2); border: 1px solid var(--line-3); margin-bottom: 6px; }
  .radius-item .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }

  .demo-card { border: 1px solid var(--line-2); background: var(--surface-glass); backdrop-filter: blur(12px);
    border-radius: var(--radius-2xl); overflow: hidden; margin-bottom: 18px; }
  .demo-live { padding: 22px; }
  .demo-code { border-top: 1px solid var(--line-2); background: rgba(0,0,0,0.35); }
  .demo-code summary { cursor: pointer; list-style: none; padding: 10px 18px; font-family: var(--font-mono);
    font-size: 10px; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-faint); user-select: none; }
  .demo-code summary::-webkit-details-marker { display: none; }
  .demo-code summary::before { content: "▸ "; }
  .demo-code[open] summary::before { content: "▾ "; }
  .demo-code pre { margin: 0; padding: 0 18px 18px; overflow-x: auto; }
  .demo-code code { font-family: var(--font-mono); font-size: 12px; line-height: var(--lh-normal); color: var(--bd-accent-soft); white-space: pre; }
  .demo-code code .tag { color: #7fd8ff; }
  .demo-code code .str { color: #a4e0a0; }

  .comp-title { font-size: var(--fs-lg); font-weight: var(--fw-semibold); color: var(--text-strong); margin: 30px 0 4px; }
  .comp-sub { font-size: var(--fs-mini); color: var(--text-faint); margin-bottom: 14px; }

  .kit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .kit-card { border: 1px solid var(--line-2); border-radius: var(--radius-2xl); background: var(--surface-1); padding: 20px; }
  .kit-card h3 { margin: 0 0 6px; font-size: var(--fs-sm); color: var(--text-strong); }
  .kit-card p { margin: 0; font-size: var(--fs-mini); color: var(--text-muted); line-height: var(--lh-normal); }
  .kit-card code { display: block; margin-top: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>

<div class="glow"></div>
<div class="page" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<CoverImage alt="Untitled Series" title="No cover art" width={150} />`}>
