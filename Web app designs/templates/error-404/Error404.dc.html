<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="404 / Error Page" description="Centered not-found page — code, message, action" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: var(--bd-black); color: var(--text-body); font-family: var(--font-ui); }
    .err-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; position: relative; }
    .err-glow { position: absolute; inset: -160px 0 auto 0; height: 480px; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 65%); pointer-events: none; }
    .err-code { font-family: var(--font-heading); font-size: 96px; font-weight: 800; color: var(--text-strong); line-height: 1; margin-bottom: 6px; position: relative; z-index: 1;
      background: linear-gradient(135deg, #fff, var(--bd-accent-text)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .err-title { font-size: 18px; font-weight: 600; color: var(--text-strong); margin-bottom: 8px; position: relative; z-index: 1; }
    .err-desc { font-size: 14px; color: var(--text-muted); max-width: 360px; margin-bottom: 26px; line-height: 1.5; position: relative; z-index: 1; }
  </style>
</helmet>

<div class="err-shell" data-screen-label="404">
  <div class="err-glow"></div>
  <div class="err-code">404</div>
  <div class="err-title">This overlay doesn't exist</div>
  <div class="err-desc">The page you're looking for was moved, deleted, or never synced. Check the URL or head back to your dashboard.</div>
  <x-import component-from-global-scope="BearddOddityDesignSystem_726917.Button" hint-size="160px,44px" variant="cta">Back to dashboard</x-import>
</div>

</x-dc>
</body>
</html>
