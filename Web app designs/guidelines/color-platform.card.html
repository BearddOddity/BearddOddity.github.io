<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);font-family:var(--font-ui);color:var(--text-body)}
  .wrap{padding:18px;display:flex;gap:12px;flex-wrap:wrap}
  .sw{width:150px;height:96px;border-radius:12px;border:1px solid var(--line-2);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .n{font-size:11px;font-weight:600}
  .h{font-family:var(--font-mono);font-size:10px;opacity:.75}
</style></head><body><div class="wrap">
  <div class="sw" style="background:#9146ff"><div class="n" style="color:#fff">Twitch</div><div class="h" style="color:#fff">#9146FF</div></div>
  <div class="sw" style="background:#53fc18"><div class="n" style="color:#0a0a0a">Kick</div><div class="h" style="color:#0a0a0a">#53FC18</div></div>
  <div class="sw" style="background:var(--brand-streamerbot-gradient)"><div class="n" style="color:#fff">Streamer.bot</div><div class="h" style="color:#fff">#A257ED → #0B72FF</div></div>
  <div class="sw" style="background:var(--brand-joystick-gradient)"><div class="n" style="color:#fff">Joystick.tv</div><div class="h" style="color:#fff">#06899C → #0EE6C8</div></div>
  <div class="sw" style="background:#ff0033"><div class="n" style="color:#fff">YouTube</div><div class="h" style="color:#fff">#FF0033</div></div>
  <div class="sw" style="background:#25f4ee"><div class="n" style="color:#0a0a0a">TikTok</div><div class="h" style="color:#0a0a0a">#25F4EE</div></div>
</div></body></html>
