<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="Dense — 2px to 40px, 6–14px is the norm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);color:var(--text-body);font-family:var(--font-ui)}
  .wrap{padding:20px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .u{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:linear-gradient(to top,#9333ea,#6366f1);border-radius:3px;width:22px}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text-faint)}
</style></head><body><div class="wrap">
  <div class="u"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
  <div class="u"><div class="bar" style="height:6px"></div><div class="n">6</div></div>
  <div class="u"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
  <div class="u"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
  <div class="u"><div class="bar" style="height:14px"></div><div class="n">14</div></div>
  <div class="u"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
  <div class="u"><div class="bar" style="height:20px"></div><div class="n">20</div></div>
  <div class="u"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
  <div class="u"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
  <div class="u"><div class="bar" style="height:40px"></div><div class="n">40</div></div>
</div></body></html>
