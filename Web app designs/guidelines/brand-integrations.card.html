<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);color:var(--text-body);font-family:var(--font-ui)}
  .wrap{padding:20px;display:flex;gap:16px;flex-wrap:wrap}
  .chip{display:flex;flex-direction:column;align-items:center;gap:8px;width:120px;padding:16px 8px;background:rgba(0,0,0,.4);border:1px solid var(--line-2);border-radius:14px}
  .chip svg{height:28px;width:auto;display:block}
  .l{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em}
</style></head><body><div class="wrap">
  <div class="chip">
    <svg style="color:#9146ff" viewBox="0 0 2400 2800" fill="currentColor"><path d="M500,0L0,500v1800h600v500l500-500h400l900-900V0H500z M2200,1300l-400,400h-400l-350,350v-350H600V200h1600 V1300z"></path><rect x="1700" y="550" width="200" height="600"></rect><rect x="1150" y="550" width="200" height="600"></rect></svg>
    <span class="l">Twitch</span>
  </div>
  <div class="chip">
    <svg style="color:#53fc18" viewBox="0 0 453.9 510.6" fill="currentColor"><path d="M0,0h170.2v113.5h56.7v-56.7h56.7V0h170.2v170.2h-56.7v56.7h-56.7v56.7h56.7v56.7h56.7v170.2h-170.2v-56.7h-56.7v-56.7h-56.7v113.5H0V0Z"></path></svg>
    <span class="l">Kick</span>
  </div>
  <div class="chip">
    <img src="../assets/logos/joystick-mark.svg" alt="Joystick.tv" style="height:20px">
    <span class="l">Joystick.tv</span>
  </div>
  <div class="chip">
    <img src="../assets/logos/streamerbot.svg" alt="Streamer.bot" style="height:28px">
    <span class="l">Streamer.bot</span>
  </div>
</div></body></html>
