<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Dense chrome scale — 10px labels up to display" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);color:#fff;font-family:var(--font-sans)}
  .wrap{padding:20px;display:flex;flex-direction:column;gap:10px}
  .r{display:flex;align-items:baseline;gap:14px}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:120px;flex-shrink:0}
</style></head><body><div class="wrap">
  <div class="r"><span class="m">3xl · 56 / 700</span><span style="font-size:56px;font-weight:700;letter-spacing:-.01em">Forge</span></div>
  <div class="r"><span class="m">2xl · 40 / 700</span><span style="font-size:40px;font-weight:700">Display heading</span></div>
  <div class="r"><span class="m">xl · 28 / 600</span><span style="font-size:28px;font-weight:600">Section heading</span></div>
  <div class="r"><span class="m">lg · 20 / 600</span><span style="font-size:20px;font-weight:600">Card title</span></div>
  <div class="r"><span class="m">sm · 13 / 500</span><span style="font-size:13px;font-weight:500">Body & navigation text — the default UI size.</span></div>
  <div class="r"><span class="m">xs · 12 / 600</span><span style="font-size:12px;font-weight:600">Buttons & values</span></div>
  <div class="r"><span class="m">micro · 10 / 600</span><span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint)">Data label</span></div>
</div></body></html>
