<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Status hues" subtitle="Success, error, warn, info tints" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);font-family:var(--font-ui);color:var(--text-body)}
  .wrap{padding:18px;display:flex;gap:12px;flex-wrap:wrap}
  .sw{width:150px;height:96px;border-radius:12px;border:1px solid var(--line-2);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .n{font-size:11px;font-weight:600;color:#050505}
  .h{font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,.6)}
</style></head><body><div class="wrap">
  <div class="sw" style="background:#4ade80"><div class="n">Green · success</div><div class="h">#4ADE80</div></div>
  <div class="sw" style="background:#f87171"><div class="n">Red · error</div><div class="h">#F87171</div></div>
  <div class="sw" style="background:#facc15"><div class="n">Amber · warn</div><div class="h">#FACC15</div></div>
  <div class="sw" style="background:#22d3ee"><div class="n">Cyan · info</div><div class="h">#22D3EE</div></div>
</div></body></html>
