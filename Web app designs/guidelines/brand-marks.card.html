<!-- @dsCard group="Brand" viewport="700x160" name="Product marks" subtitle="One shared icon language: rounded frame + gradient glyph, per-app color" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);color:var(--text-body);font-family:var(--font-ui)}
  .wrap{padding:20px;display:flex;gap:16px;flex-wrap:wrap;align-items:stretch}
  .chip{display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(0,0,0,.4);border:1px solid var(--line-2);border-radius:14px}
  .chip img{height:44px;width:44px}
  .nm{font-size:14px;font-weight:600;color:#fff}
  .sub{font-size:11px;color:var(--text-faint)}
</style></head><body><div class="wrap">
  <div class="chip"><img src="../assets/logos/statusforge-mark.svg" alt="StatusForge"><div><div class="nm">StatusForge</div><div class="sub">Rich presence engine</div></div></div>
  <div class="chip"><img src="../assets/logos/streamersuite-mark.svg" alt="StreamerSuite"><div><div class="nm">StreamerSuite</div><div class="sub">Streamer toolkit hub</div></div></div>
  <div class="chip"><img src="../assets/logos/panelforge-mark.svg" alt="PanelForge"><div><div class="nm">PanelForge</div><div class="sub">Comic reader</div></div></div>
  <div class="chip"><img src="../assets/logos/bearddoddity-wordmark-b.png" alt="BearddOddity"><div><div class="nm">BearddOddity</div><div class="sub">Studio mark (compact)</div></div></div>
  <div class="chip"><img src="../assets/logos/bearddoddity-mascot.svg" alt="BearddOddity Mascot" style="height:64px;width:64px"><div><div class="nm">BearddOddity Mascot</div><div class="sub">Full mascot — hero &amp; about use</div></div></div>
</div></body></html>
