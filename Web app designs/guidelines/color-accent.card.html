<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Twitch Purple" subtitle="The brand through-line; CTA gradient" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bd-black);font-family:var(--font-ui);color:var(--text-body)}
  .wrap{padding:18px;display:flex;gap:12px;flex-wrap:wrap}
  .sw{width:150px;height:96px;border-radius:12px;border:1px solid var(--line-2);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .n{font-size:11px;font-weight:600;color:#fff}
  .h{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.75)}
</style></head><body><div class="wrap">
  <div class="sw" style="background:#9146ff"><div class="n">Accent</div><div class="h">#9146FF</div></div>
  <div class="sw" style="background:#6b2cff"><div class="n">Accent Dark</div><div class="h">#6B2CFF</div></div>
  <div class="sw" style="background:#050505"><div class="n" style="color:#c084fc">Accent Text</div><div class="h" style="color:#c084fc">#C084FC</div></div>
  <div class="sw" style="background:linear-gradient(to right,#9333ea,#4f46e5)"><div class="n">CTA Gradient</div><div class="h">#9333EA → #4F46E5</div></div>
</div></body></html>
